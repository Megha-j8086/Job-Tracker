
{% block content %}

<style>
  body {
    background-color: #f5f7fa;
  }

  .jobs-title {
    font-weight: bold;
    color: #333;
  }

  .job-card {
    border: none;
    border-radius: 15px;
    transition: 0.3s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  }

  .job-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
  }

  .job-title {
    font-weight: 600;
    color: #2c3e50;
  }

  .company-name {
    color: #7f8c8d;
    font-size: 14px;
  }

  .badge-custom {
    background: linear-gradient(45deg, #28a745, #20c997);
    padding: 6px 12px;
    font-size: 12px;
    border-radius: 20px;
  }

  .apply-btn {
    border-radius: 20px;
    font-size: 14px;
    padding: 5px 15px;
  }
</style>

<div class="container py-5">
  <h2 class="text-center mb-4 jobs-title">All Jobs</h2>

  <div class="row">
    {% for job in jobs %}
    <div class="col-md-4 mb-4">
      <div class="card p-4 job-card">
        
        <h5 class="job-title">{{ job.title }}</h5>
        <p class="company-name">{{ job.company }}</p>

        <div class="d-flex justify-content-between align-items-center mt-3">
          <span class="badge badge-custom">Available</span>

          <a href="{% url 'apply_job' job.id %}" class="btn btn-sm btn-primary apply-btn">
            Apply
          </a>
        </div>

      </div>
    </div>
    {% endfor %}
  </div>
</div>

{% endblock %}
