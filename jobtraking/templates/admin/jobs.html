<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Jobs</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        .container {
            padding: 20px;
        }

        h2 {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #2f3542;
            color: white;
        }

        tr:hover {
            background: #f1f2f6;
        }

        .btn-delete {
            background: red;
            color: white;
            padding: 6px 10px;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn-delete:hover {
            background: darkred;
        }

        .back {
            margin-bottom: 15px;
            display: inline-block;
            text-decoration: none;
            color: #2f3542;
        }
    </style>
</head>

<body>

<div class="container">
    <a href="{% url 'admin_dashboard' %}" class="back">⬅ Back to Dashboard</a>

    <h2>Manage Jobs</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Company</th>
            <th>Role</th>
            <th>Experience</th>
            <th>Salary</th>
        </tr>

        {% for job in jobs %}
        <tr>
            <td>{{ job.id }}</td>
            <td>{{ job.company }}</td>
            <td>{{ job.role }}</td>
           
            <td>
                <a href="{% url 'delete_job' job.id %}" class="btn-delete">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
