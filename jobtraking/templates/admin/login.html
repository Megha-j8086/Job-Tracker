<form method="POST">
    {% csrf_token %}
    <h2>Admin Login</h2>
    <style>
        /* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* Body */
body {
    height: 100vh;
    background: linear-gradient(135deg, #ff7e5f, #feb47b);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Container */
.container {
    background: #fff;
    padding: 40px;
    width: 350px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    text-align: center;
    animation: fadeIn 0.8s ease-in-out;
}

/* Title */
.container h1 {
    color: #333;
}

/* Error Box */
.login-error-box {
    font-size: 14px;
    color: #ff4d4d;
    margin-top: 5px;
}

/* Title Bar */
.title-bar {
    width: 60px;
    height: 4px;
    background: #ff7e5f;
    margin: 10px auto 25px;
    border-radius: 2px;
}

/* Labels */
label {
    display: block;
    text-align: left;
    margin-top: 15px;
    font-size: 14px;
    color: #555;
}

/* Inputs */
input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.3s;
}

/* Input Focus */
input:focus {
    border-color: #ff7e5f;
    box-shadow: 0 0 8px rgba(255, 126, 95, 0.3);
}

/* Forgot Password */
.forgot {
    display: block;
    text-align: right;
    margin-top: 8px;
    font-size: 13px;
}

.forgot a {
    color: #ff7e5f;
    text-decoration: none;
}

.forgot a:hover {
    text-decoration: underline;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    border: none;
    background: linear-gradient(135deg, rgb(230, 66, 25), #e67723);
    color: white;
    font-size: 16px;
    border-radius: 25px;
    cursor: pointer;
    transition: 0.3s;
}

/* Button Hover */
button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
}

/* Bottom Text */
p {
    margin-top: 15px;
    font-size: 14px;
    color: #666;
}

p a {
    color: #ff7e5f;
    text-decoration: none;
    font-weight: 500;
}

p a:hover {
    text-decoration: underline;
}

/* Animation */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

    <input type="text" name="username" placeholder="Username">
    <input type="password" name="password" placeholder="Password">

    <button type="submit">Login</button>

    <p style="color:red;">{{ error }}</p>
</form>
